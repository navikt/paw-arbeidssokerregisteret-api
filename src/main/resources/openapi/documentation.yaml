components:
  schemas:
    Instant:
      type: "object"
      properties: {}
    BrukerResponse:
      type: "object"
      properties:
        type:
          type: "string"
          enum:
          - "UKJENT_VERDI"
          - "UDEFINERT"
          - "VEILEDER"
          - "SYSTEM"
          - "SLUTTBRUKER"
    MetadataResponse:
      type: "object"
      properties:
        tidspunkt:
          $ref: "#/components/schemas/Instant"
        utfoertAv:
          $ref: "#/components/schemas/BrukerResponse"
        kilde:
          type: "string"
        aarsak:
          type: "string"
    PeriodeResponse:
      type: "object"
      properties:
        startet:
          $ref: "#/components/schemas/MetadataResponse"
        avsluttet:
          $ref: "#/components/schemas/MetadataResponse"
    UtdanningResponse:
      type: "object"
      properties:
        lengde:
          type: "string"
          enum:
          - "UKJENT_VERDI"
          - "UDEFINERT"
          - "INGEN_UTDANNING"
          - "GRUNNSKOLE"
          - "VIDEREGAENDE_GRUNNUTDANNING"
          - "VIDEREGAENDE_FAGBREV_SVENNEBREV"
          - "HOYERE_UTDANNING_1_TIL_4"
          - "HOYERE_UTDANNING_5_ELLER_MER"
        bestaatt:
          type: "string"
          enum:
          - "JA"
          - "NEI"
          - "VET_IKKE"
        godkjent:
          type: "string"
          enum:
          - "JA"
          - "NEI"
          - "VET_IKKE"
    HelseResponse:
      type: "object"
      properties:
        helseTilstandHindrerArbeid:
          type: "string"
          enum:
          - "JA"
          - "NEI"
          - "VET_IKKE"
    ArbeidserfaringResponse:
      type: "object"
      properties:
        harHattArbeid:
          type: "string"
          enum:
          - "JA"
          - "NEI"
          - "VET_IKKE"
    AnnetResponse:
      type: "object"
      properties:
        andreForholdHindrerArbeid:
          type: "string"
          enum:
          - "JA"
          - "NEI"
          - "VET_IKKE"
    BeskrivelseMedDetaljerResponse:
      type: "object"
      properties:
        beskrivelse:
          type: "string"
          enum:
          - "UKJENT_VERDI"
          - "UDEFINERT"
          - "HAR_SAGT_OPP"
          - "HAR_BLITT_SAGT_OPP"
          - "ER_PERMITTERT"
          - "ALDRI_HATT_JOBB"
          - "IKKE_VAERT_I_JOBB_SISTE_2_AAR"
          - "AKKURAT_FULLFORT_UTDANNING"
          - "VIL_BYTTE_JOBB"
          - "USIKKER_JOBBSITUASJON"
          - "MIDLERTIDIG_JOBB"
          - "DELTIDSJOBB_VIL_MER"
          - "NY_JOBB"
          - "KONKURS"
          - "ANNET"
        detaljer:
          type: "string"
    OpplysningerOmArbeidssoekerResponse:
      type: "object"
      properties:
        opplysningerOmArbeidssoekerId:
          type: "string"
          format: "uuid"
        periodeId:
          type: "string"
          format: "uuid"
        sendtInnAv:
          $ref: "#/components/schemas/MetadataResponse"
        utdanning:
          $ref: "#/components/schemas/UtdanningResponse"
        helse:
          $ref: "#/components/schemas/HelseResponse"
        arbeidserfaring:
          $ref: "#/components/schemas/ArbeidserfaringResponse"
        annet:
          $ref: "#/components/schemas/AnnetResponse"
        jobbsituasjon:
          type: "array"
          items:
            $ref: "#/components/schemas/BeskrivelseMedDetaljerResponse"
    ProfileringResponse:
      type: "object"
      properties:
        profileringId:
          type: "string"
          format: "uuid"
        periodeId:
          type: "string"
          format: "uuid"
        opplysningerOmArbeidssoeker:
          $ref: "#/components/schemas/OpplysningerOmArbeidssoekerResponse"
        sendtInnAv:
          $ref: "#/components/schemas/MetadataResponse"
        profilertTil:
          type: "string"
          enum:
          - "UKJENT_VERDI"
          - "UDEFINERT"
          - "ANTATT_GODE_MULIGHETER"
          - "ANTATT_BEHOV_FOR_VEILEDNING"
          - "OPPGITT_HINDRINGER"
        jobbetSammenhengendeSeksAvTolvSisteManeder:
          type: "boolean"
        alder:
          type: "integer"
          format: "int32"
    ArbeidssokerperiodeRequest:
      type: "object"
      properties:
        identitetsnummer:
          type: "string"
    OpplysningerOmArbeidssoekerRequest:
      type: "object"
      properties:
        identitetsnummer:
          type: "string"
        periodeId:
          type: "string"
          format: "uuid"
    ProfileringRequest:
      type: "object"
      properties:
        identitetsnummer:
          type: "string"
        periodeId:
          type: "string"
          format: "uuid"